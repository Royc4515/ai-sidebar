<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Sidebar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      width: 240px;
      padding: 16px;
    }
    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .popup-logo { font-size: 22px; }
    .popup-title { font-size: 16px; font-weight: 700; }
    .provider-status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf81;
      flex-shrink: 0;
    }
    .status-dot.none { background: #555; }
    .provider-name { color: #e0e0f0; font-weight: 500; }
    .provider-none { color: #8888aa; }
    .toggle-btn {
      width: 100%;
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    .toggle-btn:hover { background: #9589f9; }
    .shortcut-hint {
      text-align: center;
      font-size: 11px;
      color: #8888aa;
      margin-bottom: 12px;
    }
    .settings-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #8888aa;
      text-decoration: none;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .settings-link:hover { color: #7c6af7; }
    kbd {
      background: #242442;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-logo">✨</span>
    <span class="popup-title">AI Sidebar</span>
  </div>

  <div class="provider-status" id="provider-status">
    <div class="status-dot none" id="status-dot"></div>
    <span id="provider-name-text" class="provider-none">No provider set</span>
  </div>

  <button class="toggle-btn" id="toggle-btn">Toggle Sidebar</button>
  <div class="shortcut-hint">or press <kbd>Alt+A</kbd> on any page</div>

  <a href="settings.html" class="settings-link" id="settings-link">⚙ Settings</a>

  <script src="popup.js"></script>
</body>
</html>
